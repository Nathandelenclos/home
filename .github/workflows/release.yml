name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B clean test package

      - name: Locate plugin JAR
        id: jar
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH="$(find target -maxdepth 1 -type f -name '*.jar' \
            | grep -Ev '(original-|sources|javadoc)' \
            | head -n 1)"

          if [[ -z "${JAR_PATH}" ]]; then
            echo "No release JAR found in target/."
            exit 1
          fi

          echo "jar_path=${JAR_PATH}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.jar_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true