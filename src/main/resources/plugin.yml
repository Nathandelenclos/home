name: home
version: '1.0-SNAPSHOT'
main: fr.nathandelenclos.home.Home
api-version: '1.21'
commands:
  sethome:
    description: Enregistre un home personnel
    usage: /sethome <nom>
  home:
    description: Teleporte au home ou affiche la liste des homes
    usage: /home [nom]
  delhome:
    description: Supprime un home personnel
    usage: /delhome <nom>
  setwarp:
    description: Enregistre un warp public du serveur
    usage: /setwarp <nom>
    aliases: [setwarps]
  warp:
    description: Teleporte vers un warp
    usage: /warp <nom>
  delwarp:
    description: Supprime un warp du serveur
    usage: /delwarp <nom>
  warps:
    description: Affiche la liste des warps
    usage: /warps
  tpa:
    description: Envoie une demande de teleportation a un joueur
    usage: /tpa <joueur>
  tpaccept:
    description: Accepte une demande de teleportation
    usage: /tpaccept
  tpdeny:
    description: Refuse une demande de teleportation
    usage: /tpdeny
